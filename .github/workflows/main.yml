name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. fك ضغط الملف المضغوط
      - name: Unzip project files
        run: unzip *.zip -d project_dir

      # 4. توليد الملف المفقود وإصلاح التوقيع وبناء الـ APK
      - name: Inject Missing Repository and Build APK
        env:
          _JAVA_OPTIONS: "-Djava.awt.headless=true"
          GRADLE_OPTS: "-Djava.awt.headless=true -Dorg.gradle.jvmargs=-Djava.awt.headless=true"
        run: |
          # البحث عن مجلد المشروع
          TARGET_DIR=$(find project_dir -name "settings.gradle.kts" -exec dirname {} \;)
          if [ -z "$TARGET_DIR" ]; then
            echo "❌ خطأ: لم يتم العثور على ملفات مشروع أندرويد!"
            exit 1
          fi
          cd "$TARGET_DIR"
          
          echo "🛠️ إنشاء ملف الكلاس المفقود POSRepository.kt تلقائياً..."
          mkdir -p app/src/main/java/com/example/data
          cat << 'EOF' > app/src/main/java/com/example/data/POSRepository.kt
          package com.example.data

          import kotlinx.coroutines.flow.Flow

          class POSRepository(private val posDao: POSDao) {
              val allCategories: Flow<List<Category>> = posDao.getAllCategories()
              val allProducts: Flow<List<Product>> = posDao.getAllProducts()
              val allInvoices: Flow<List<Invoice>> = posDao.getAllInvoices()
              val allShiftLogs: Flow<List<ShiftLog>> = posDao.getAllShiftLogs()
              val allInvoiceItems: Flow<List<InvoiceItem>> = posDao.getAllInvoiceItems()

              suspend fun prepopulateIfEmpty() {
                  // يمكن تركها فارغة أو كتابة كود افتراضي بداخلها لاحقاً
              }

              suspend fun createInvoice(invoice: Invoice, items: List<InvoiceItem>): Long {
                  val id = posDao.insertInvoice(invoice)
                  items.forEach { 
                      posDao.insertInvoiceItem(it.copy(invoiceNumber = id))
                  }
                  return id
              }

              suspend fun insertCategory(category: Category) = posDao.insertCategory(category)
              suspend fun updateCategory(category: Category) = posDao.updateCategory(category)
              suspend fun deleteCategory(category: Category) = posDao.deleteCategory(category)

              suspend fun insertProduct(product: Product) = posDao.insertProduct(product)
              suspend fun updateProduct(product: Product) = posDao.updateProduct(product)
              suspend fun deleteProduct(product: Product) = posDao.deleteProduct(product)

              suspend fun insertShiftLog(shiftLog: ShiftLog) = posDao.insertShiftLog(shiftLog)
              suspend fun updateShiftLog(shiftLog: ShiftLog) = posDao.updateShiftLog(shiftLog)
              suspend fun deleteShiftLog(shiftLog: ShiftLog) = posDao.deleteShiftLog(shiftLog)

              suspend fun deleteInvoice(invoice: Invoice) {
                  posDao.deleteInvoice(invoice)
                  posDao.deleteInvoiceItemsByInvoiceNo(invoice.invoiceNumber)
              }

              suspend fun clearAllData() {
                  posDao.clearCategories()
                  posDao.clearProducts()
                  posDao.clearInvoices()
                  posDao.clearInvoiceItems()
                  posDao.clearShiftLogs()
              }
          }
          EOF
          
          echo "🛠️ توليد ملفات gradlew..."
          gradle wrapper
          chmod +x gradlew
          
          echo "🔑 توليد ملف debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

          echo "📄 توليد ملف google-services.json متوافق مع حزمة التطبيق..."
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info": {"project_number": "123456789", "project_id": "casher-mock-id"}, "client": [{"client_info": {"mobilesdk_app_id": "1:123456789:android:123456", "android_client_info": {"package_name": "com.aistudio.restaurantpos.vmdjqk"}}, "api_key": [{"current_key": "mock_api_key_here"}]}]}' > app/google-services.json
          fi

          echo "🚀 بدء بناء الـ APK..."
          ./gradlew assembleDebug --no-daemon -Djava.awt.headless=true

      # 5. رفع ملف الـ APK الناتج لتحميله
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: project_dir/**/build/outputs/apk/debug/*.apk
